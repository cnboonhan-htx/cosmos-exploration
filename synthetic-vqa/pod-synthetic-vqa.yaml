apiVersion: v1
kind: Pod
metadata:
  name: synthetic-vqa-gen
  namespace: runai-embodied-ai
spec:
  restartPolicy: Never
  containers:
    - name: synthetic-vqa-gen
      image: default-route-openshift-image-registry.apps.octocp.alexnet.htx/runai-embodied-ai/synthetic-vqa:latest
      command:
        - python
        - /workspace/datasets/generate_images.py
        - --prompts-file
        - /config/prompts.json
        - --output-dir
        - /persistent-data/synthetic-vqa/images
      resources:
        limits:
          nvidia.com/gpu: "1"
      securityContext:
        runAsUser: 0
      volumeMounts:
        - name: prompts-config
          mountPath: /config
          readOnly: true
        - name: object-data
          mountPath: /root/P1a
          readOnly: true
        - name: persistent-data
          mountPath: /persistent-data
        - name: rclone-config
          mountPath: /root/.config/rclone/rclone.conf
          subPath: rclone.conf
        - name: mc-home
          mountPath: /root/.mc
        - name: mc-config
          mountPath: /root/.mc/config.json
          subPath: mc.conf
        - name: dshm
          mountPath: /dev/shm
  volumes:
    - name: prompts-config
      configMap:
        name: synthetic-vqa-prompts
    - name: rclone-config
      secret:
        secretName: rclone-config
    - name: mc-home
      emptyDir: {}
    - name: mc-config
      secret:
        secretName: mc-config
        defaultMode: 0444
    - name: object-data
      persistentVolumeClaim:
        claimName: hot-storage-data-pvc
    - name: persistent-data
      persistentVolumeClaim:
        claimName: jupyter-5-persistent-hot-storage-pvc
    - name: dshm
      emptyDir:
        medium: Memory
